{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop - EmpathyQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-50: #eef2ff;
            --primary-100: #e0e7ff;
            --primary-200: #c7d2fe;
            --primary-300: #a5b4fc;
            --primary-400: #818cf8;
            --primary-500: #6366f1;
            --primary-600: #4f46e5;
            --primary-700: #4338ca;
            --primary-800: #3730a3;
            --primary-900: #312e81;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-full: 9999px;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .game-wrapper {
            padding: 20px 0 40px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .game-header h2 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .game-header h2 i {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 50%;
            font-size: 2rem;
        }

        .back-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 12px 28px;
            border-radius: var(--radius-full);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: white;
            color: #667eea;
            transform: translateY(-2px);
            border-color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .stats-container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-2xl);
            padding: 25px;
            color: white;
            margin-bottom: 25px;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: var(--shadow-lg);
        }

        .stat-box {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(5px);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            border-radius: var(--radius-2xl);
            overflow: hidden;
            box-shadow: var(--shadow-2xl);
        }

        #gameCanvas {
            width: 100%;
            height: auto;
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            display: block;
            aspect-ratio: 16/9;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="white" stroke="%234f46e5" stroke-width="2"/><circle cx="8" cy="8" r="2" fill="%234f46e5"/></svg>') 12 12, auto;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }

        .control-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.3rem;
            backdrop-filter: blur(5px);
        }

        .control-btn:hover {
            background: white;
            color: #667eea;
            transform: scale(1.15);
            border-color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .personal-stats {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-2xl);
            padding: 25px;
            margin-top: 25px;
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            text-align: center;
        }

        .stat-item {
            padding: 15px;
            background: var(--gray-50);
            border-radius: var(--radius-lg);
        }

        .stat-label-sm {
            color: var(--gray-600);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .stat-value-lg {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border-radius: var(--radius-2xl);
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
            font-weight: 700;
            z-index: 10;
        }

        .game-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .overlay-content {
            text-align: center;
        }

        .overlay-content i {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Explosion Animation Container */
        .explosion-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .explosion {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: explode 0.4s ease-out forwards;
            pointer-events: none;
        }

        @keyframes explode {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(255,255,255,0.7);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0.8;
                box-shadow: 0 0 50px 25px rgba(255,255,255,0.5);
            }
            100% {
                transform: translate(-50%, -50%) scale(2.5);
                opacity: 0;
                box-shadow: 0 0 100px 50px rgba(255,255,255,0);
            }
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: white;
            animation: particle 0.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes particle {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Combo Counter */
        .combo-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            padding: 10px 20px;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
            z-index: 20;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .combo-counter i {
            margin-right: 8px;
            color: #ffd700;
        }

        /* Milestone Message */
        .milestone-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: white;
            padding: 20px 40px;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 2rem;
            box-shadow: var(--shadow-2xl);
            animation: milestonePop 1s ease forwards;
            z-index: 30;
            text-align: center;
            white-space: nowrap;
        }

        @keyframes milestonePop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .game-header {
                flex-direction: column;
                text-align: center;
            }
            
            .game-header h2 {
                font-size: 2rem;
            }
            
            .stats-container .row {
                gap: 10px;
            }
            
            .stat-value {
                font-size: 1.8rem;
            }
            
            .combo-counter {
                top: 10px;
                right: 10px;
                padding: 5px 15px;
                font-size: 1rem;
            }
            
            .milestone-message {
                padding: 15px 25px;
                font-size: 1.5rem;
                white-space: normal;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="container">
            <!-- Header with working back button -->
            <div class="game-header">
                <h2>
                    <i class="fas fa-water"></i>
                    Bubble Pop
                </h2>
                <a href="{% url 'accounts:user_dashboard' %}" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Dashboard</span>
                </a>
            </div>

            <!-- Stats -->
            <div class="stats-container">
                <div class="row g-3">
                    <div class="col-4">
                        <div class="stat-box">
                            <div class="stat-value" id="score">0</div>
                            <div class="stat-label">Popped</div>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="stat-box">
                            <div class="stat-value" id="bubblesLeft">0</div>
                            <div class="stat-label">Bubbles</div>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="stat-box">
                            <div class="stat-value" id="timer">00:00</div>
                            <div class="stat-label">Time</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Game Area -->
            <div class="game-container">
                <canvas id="gameCanvas" width="900" height="506"></canvas>
                <div id="explosionContainer" class="explosion-container"></div>
                <div id="gameOverlay" class="game-overlay">
                    <div class="overlay-content">
                        <i class="fas fa-pause-circle"></i>
                        <div id="overlayText">Paused</div>
                    </div>
                </div>
                <div id="comboCounter" class="combo-counter" style="display: none;">
                    <i class="fas fa-star"></i>
                    <span id="comboCount">0</span>x Combo!
                </div>
                <div id="milestoneMessage" class="milestone-message" style="display: none;"></div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="control-btn" onclick="toggleSound()" id="soundBtn" title="Sound">
                    <i class="fas fa-volume-up"></i>
                </div>
                <div class="control-btn" onclick="togglePause()" id="pauseBtn" title="Pause/Resume">
                    <i class="fas fa-pause"></i>
                </div>
                <div class="control-btn" onclick="resetGame()" title="New Game">
                    <i class="fas fa-redo-alt"></i>
                </div>
            </div>

            <!-- Personal Stats -->
            <div class="personal-stats">
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label-sm">Highest Score</div>
                        <div class="stat-value-lg" id="highestScore">{{ scores.highest_score|default:0 }}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label-sm">Games Played</div>
                        <div class="stat-value-lg" id="gamesPlayed">{{ scores.games_played|default:0 }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get scores from Django
        const userScores = {{ scores|safe }};
        let highestScore = userScores.highest_score || 0;
        let gamesPlayed = userScores.games_played || 0;

        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const explosionContainer = document.getElementById('explosionContainer');
        
        // Game state
        let bubbles = [];
        let score = 0;
        let gameActive = true;
        let paused = false;
        let soundOn = true;
        let timer = 0;
        let timerInterval = null;
        let animationFrame = null;
        
        // Combo system
        let combo = 0;
        let lastPopTime = 0;
        const COMBO_TIMEOUT = 1000; // 1 second to maintain combo
        
        // Milestone tracking
        let lastMilestone = 0;
        
        const MAX_BUBBLES = 12;
        const BUBBLE_COLORS = [
            '#ff6b6b', '#4ecdc4', '#ffe66d', '#ff9ff3', 
            '#feca57', '#48dbfb', '#f368e0', '#1dd1a1',
            '#ff6b9d', '#a8e6cf'
        ];

        // Initialize display
        document.getElementById('highestScore').textContent = highestScore;
        document.getElementById('gamesPlayed').textContent = gamesPlayed;

        // Bubble class
        class Bubble {
            constructor() {
                this.reset();
            }

            reset() {
                this.radius = Math.random() * 20 + 15; // 15-35px
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = Math.random() * (canvas.height - this.radius * 2) + this.radius;
                this.speedX = (Math.random() - 0.5) * 1.2;
                this.speedY = (Math.random() - 0.5) * 1.2;
                this.color = BUBBLE_COLORS[Math.floor(Math.random() * BUBBLE_COLORS.length)];
                this.opacity = 0.9;
            }

            draw() {
                ctx.save();
                
                // Main bubble
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                
                // Create gradient for 3D effect
                const gradient = ctx.createRadialGradient(
                    this.x - 5, this.y - 5, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, this.color + 'CC');
                
                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                
                // Highlight
                ctx.beginPath();
                ctx.arc(this.x - 5, this.y - 5, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fill();
                
                // Outline
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                ctx.restore();
            }

            update() {
                if (paused) return;
                
                // Move bubble
                this.x += this.speedX;
                this.y += this.speedY;
                
                // Bounce off walls with energy loss
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.speedX *= -0.8;
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.speedX *= -0.8;
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.speedY *= -0.8;
                }
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.speedY *= -0.8;
                }
                
                // Slow fade
                this.opacity = Math.max(0.4, this.opacity - 0.0005);
            }

            containsPoint(px, py) {
                const dx = px - this.x;
                const dy = py - this.y;
                return (dx * dx + dy * dy) <= (this.radius * this.radius);
            }
        }

        // Create explosion effect
        function createExplosion(x, y, color) {
            // Main explosion ring
            const explosion = document.createElement('div');
            explosion.className = 'explosion';
            explosion.style.left = x + 'px';
            explosion.style.top = y + 'px';
            explosion.style.background = `radial-gradient(circle, ${color}80, transparent 70%)`;
            explosionContainer.appendChild(explosion);
            
            // Create particles
            const particleCount = 12;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                // Random direction
                const angle = (i / particleCount) * Math.PI * 2;
                const distance = 50 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.background = color;
                
                explosionContainer.appendChild(particle);
                
                // Remove particle after animation
                setTimeout(() => {
                    if (particle.parentNode) particle.remove();
                }, 500);
            }
            
            // Remove explosion after animation
            setTimeout(() => {
                if (explosion.parentNode) explosion.remove();
            }, 400);
        }

        // Update combo counter
        function updateCombo() {
            const now = Date.now();
            
            if (now - lastPopTime < COMBO_TIMEOUT) {
                combo++;
            } else {
                combo = 1;
            }
            
            lastPopTime = now;
            
            const comboDiv = document.getElementById('comboCounter');
            const comboCount = document.getElementById('comboCount');
            
            if (combo >= 3) {
                comboCount.textContent = combo;
                comboDiv.style.display = 'block';
                
                // Pulse effect
                comboDiv.style.animation = 'none';
                comboDiv.offsetHeight;
                comboDiv.style.animation = 'slideIn 0.3s ease';
            } else {
                comboDiv.style.display = 'none';
            }
        }

        // Show milestone message
        function showMilestone(score) {
            const milestoneDiv = document.getElementById('milestoneMessage');
            let message = '';
            
            if (score === 10) message = '🎉 10 Bubbles! Great start! 🎉';
            else if (score === 25) message = '🌟 25 Bubbles! You\'re on fire! 🌟';
            else if (score === 50) message = '💫 50 Bubbles! Amazing! 💫';
            else if (score === 75) message = '⚡ 75 Bubbles! Incredible! ⚡';
            else if (score === 100) message = '🏆 100 Bubbles! Master Popper! 🏆';
            else if (score % 50 === 0) message = `🎯 ${score} Bubbles! Keep going! 🎯`;
            
            if (message) {
                milestoneDiv.textContent = message;
                milestoneDiv.style.display = 'block';
                
                setTimeout(() => {
                    milestoneDiv.style.display = 'none';
                }, 2000);
            }
        }

        // Initialize game
        function initGame() {
            // Clear existing bubbles
            bubbles = [];
            
            // Create new bubbles
            for (let i = 0; i < MAX_BUBBLES; i++) {
                bubbles.push(new Bubble());
            }
            
            // Reset score and timer
            score = 0;
            timer = 0;
            combo = 0;
            lastPopTime = 0;
            lastMilestone = 0;
            gameActive = true;
            paused = false;
            
            // Update displays
            updateScore();
            document.getElementById('timer').textContent = '00:00';
            document.getElementById('pauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
            document.getElementById('gameOverlay').classList.remove('show');
            document.getElementById('comboCounter').style.display = 'none';
            
            // Stop any existing timer
            if (timerInterval) clearInterval(timerInterval);
            
            // Start new timer
            startTimer();
            
            // Start animation
            if (animationFrame) cancelAnimationFrame(animationFrame);
            animate();
        }

        // Animation loop
        function animate() {
            if (!gameActive) return;
            
            // Clear canvas with fade effect
            ctx.fillStyle = 'rgba(33, 147, 176, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw water effect
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.arc(
                    100 + Math.random() * (canvas.width - 200),
                    100 + Math.random() * (canvas.height - 200),
                    50 + Math.random() * 100,
                    0, Math.PI * 2
                );
                ctx.fill();
            }
            
            // Update and draw bubbles
            bubbles.forEach(bubble => {
                bubble.update();
                bubble.draw();
            });
            
            animationFrame = requestAnimationFrame(animate);
        }

        // Handle clicks
        canvas.addEventListener('click', (e) => {
            if (paused || !gameActive) return;
            
            // Get mouse position relative to canvas
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            
            // Check each bubble
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const bubble = bubbles[i];
                if (bubble.containsPoint(mouseX, mouseY)) {
                    // Create explosion effect
                    const canvasRect = canvas.getBoundingClientRect();
                    const screenX = (bubble.x / scaleX) + canvasRect.left;
                    const screenY = (bubble.y / scaleY) + canvasRect.top;
                    createExplosion(screenX, screenY, bubble.color);
                    
                    // Pop the bubble
                    bubbles.splice(i, 1);
                    score++;
                    
                    // Update combo
                    updateCombo();
                    
                    // Check for milestone
                    if (score > lastMilestone && (score % 10 === 0 || score === 25 || score === 50 || score === 75 || score === 100)) {
                        showMilestone(score);
                        lastMilestone = score;
                    }
                    
                    // Play sound
                    if (soundOn) playPopSound();
                    
                    // Add new bubble
                    if (bubbles.length < MAX_BUBBLES) {
                        bubbles.push(new Bubble());
                    }
                    
                    updateScore();
                    
                    // Save score at milestones
                    if (score % 10 === 0) {
                        saveGameScore();
                    }
                    
                    break;
                }
            }
        });

        // Touch support for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (paused || !gameActive) return;
            
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const touchX = (touch.clientX - rect.left) * scaleX;
            const touchY = (touch.clientY - rect.top) * scaleY;
            
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const bubble = bubbles[i];
                if (bubble.containsPoint(touchX, touchY)) {
                    // Create explosion effect
                    const canvasRect = canvas.getBoundingClientRect();
                    const screenX = (bubble.x / scaleX) + canvasRect.left;
                    const screenY = (bubble.y / scaleY) + canvasRect.top;
                    createExplosion(screenX, screenY, bubble.color);
                    
                    bubbles.splice(i, 1);
                    score++;
                    
                    updateCombo();
                    
                    if (score > lastMilestone && (score % 10 === 0 || score === 25 || score === 50 || score === 75 || score === 100)) {
                        showMilestone(score);
                        lastMilestone = score;
                    }
                    
                    if (soundOn) playPopSound();
                    
                    if (bubbles.length < MAX_BUBBLES) {
                        bubbles.push(new Bubble());
                    }
                    
                    updateScore();
                    
                    if (score % 10 === 0) {
                        saveGameScore();
                    }
                    
                    break;
                }
            }
        });

        // Play pop sound
        function playPopSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.type = 'sine';
                oscillator.frequency.value = 600 + Math.random() * 200;
                gainNode.gain.value = 0.1;
                
                oscillator.start();
                oscillator.stop(0.05);
                
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
            } catch (e) {
                console.log('Audio not supported');
            }
        }

        // Update score display
        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('bubblesLeft').textContent = bubbles.length;
            if (score > highestScore) {
                document.getElementById('highestScore').textContent = score;
            }
        }

        // Timer
        function startTimer() {
            timerInterval = setInterval(() => {
                if (!paused && gameActive) {
                    timer++;
                    const minutes = Math.floor(timer / 60);
                    const seconds = timer % 60;
                    document.getElementById('timer').textContent = 
                        `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        // Save score to server
        function saveGameScore() {
            fetch("{% url 'user:save_game_score' %}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({
                    game: 'BUBBLEPOP',
                    score: score,
                    time: timer,
                    completed: true
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    highestScore = data.highest_score;
                    gamesPlayed = data.games_played;
                    document.getElementById('highestScore').textContent = highestScore;
                    document.getElementById('gamesPlayed').textContent = gamesPlayed;
                }
            })
            .catch(error => console.error('Error saving score:', error));
        }

        // Control functions
        function toggleSound() {
            soundOn = !soundOn;
            document.getElementById('soundBtn').innerHTML = soundOn ? 
                '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
        }

        function togglePause() {
            if (!gameActive) return;
            
            paused = !paused;
            const pauseBtn = document.getElementById('pauseBtn');
            const overlay = document.getElementById('gameOverlay');
            
            pauseBtn.innerHTML = paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            
            if (paused) {
                overlay.classList.add('show');
                document.getElementById('overlayText').textContent = 'Paused';
            } else {
                overlay.classList.remove('show');
            }
        }

        function resetGame() {
            // Save current score before reset
            if (score > 0) {
                saveGameScore();
            }
            
            initGame();
        }

        // Handle page visibility
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (!paused && gameActive) {
                    togglePause();
                }
            }
        });

        // Clean up
        window.addEventListener('beforeunload', () => {
            if (timerInterval) clearInterval(timerInterval);
            if (animationFrame) cancelAnimationFrame(animationFrame);
            
            if (score > 0) {
                saveGameScore();
            }
        });

        // Start game
        document.addEventListener('DOMContentLoaded', () => {
            initGame();
        });
    </script>
</body>
</html>
