<!DOCTYPE html>
<html>
<head>
    <title>Snake Arcade - Classic Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1e2c 0%, #2d1f2f 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-wrapper {
            max-width: 1200px;
            width: 100%;
            position: relative;
        }
        
        /* Decorative elements */
        .glow-orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(76, 175, 80, 0.2), transparent 70%);
            top: -100px;
            right: -100px;
            z-index: 0;
            pointer-events: none;
            animation: float 20s infinite ease-in-out;
        }
        
        .glow-orb-2 {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle at 70% 70%, rgba(33, 150, 243, 0.15), transparent 70%);
            bottom: -150px;
            left: -150px;
            z-index: 0;
            pointer-events: none;
            animation: float 25s infinite ease-in-out reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 20px) scale(1.1); }
        }
        
        .game-card {
            background: rgba(18, 22, 35, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 1;
        }
        
        /* Header Section */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
        }
        
        .title-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .snake-icon {
            font-size: 40px;
            filter: drop-shadow(0 0 15px rgba(76, 175, 80, 0.5));
            animation: bounce 2s infinite ease-in-out;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .game-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #4CAF50, #81C784);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        
        .game-subtitle {
            font-size: 14px;
            color: #888ea0;
            margin-top: 5px;
            font-weight: 300;
        }
        
        /* Score Cards */
        .score-panel {
            display: flex;
            gap: 20px;
        }
        
        .score-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 15px 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }
        
        .score-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4CAF50, transparent);
            animation: scan 2s infinite linear;
        }
        
        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .score-label {
            font-size: 14px;
            color: #888ea0;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .score-value {
            font-size: 32px;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }
        
        .score-value#highestScore {
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        .score-unit {
            font-size: 14px;
            color: #888ea0;
            margin-left: 5px;
            font-weight: 300;
        }
        
        /* Canvas Container */
        .canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0 30px;
            position: relative;
        }
        
        .canvas-frame {
            position: relative;
            display: inline-block;
        }
        
        canvas {
            display: block;
            width: 600px;
            height: 600px;
            border-radius: 30px;
            background: #0A0C14;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.6),
                0 0 0 2px rgba(76, 175, 80, 0.3),
                0 0 0 4px rgba(255, 255, 255, 0.05);
        }
        
        /* Pause Overlay */
        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px);
            border-radius: 30px;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        .pause-content {
            text-align: center;
        }
        
        .pause-icon {
            font-size: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
            animation: pulse 1.5s infinite;
        }
        
        .pause-text {
            font-size: 48px;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
        }
        
        .pause-hint {
            color: #888ea0;
            margin-top: 15px;
            font-size: 16px;
        }
        
        /* Canvas Corner Decorations */
        .corner-decoration {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid #4CAF50;
            opacity: 0.5;
        }
        
        .corner-tl {
            top: -15px;
            left: -15px;
            border-right: none;
            border-bottom: none;
        }
        
        .corner-tr {
            top: -15px;
            right: -15px;
            border-left: none;
            border-bottom: none;
        }
        
        .corner-bl {
            bottom: -15px;
            left: -15px;
            border-right: none;
            border-top: none;
        }
        
        .corner-br {
            bottom: -15px;
            right: -15px;
            border-left: none;
            border-top: none;
        }
        
        /* Control Panel */
        .control-panel {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn-restart {
            background: linear-gradient(135deg, #FF8A5C, #FF6B4A);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(255, 107, 74, 0.3);
        }
        
        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(255, 107, 74, 0.5);
        }
        
        .btn-pause {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(255, 215, 0, 0.3);
        }
        
        .btn-pause:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(255, 215, 0, 0.5);
        }
        
        .btn-pause.paused {
            background: linear-gradient(135deg, #4CAF50, #45a049);
        }
        
        .btn-dashboard {
            background: linear-gradient(135deg, #4A90E2, #357ABD);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(74, 144, 226, 0.3);
            text-decoration: none;
        }
        
        .btn-dashboard:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(74, 144, 226, 0.5);
        }
        
        .btn-icon {
            font-size: 20px;
        }
        
        /* Instructions */
        .instructions-panel {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .instruction-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #888ea0;
            font-size: 14px;
        }
        
        .key-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 600;
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        /* Game Stats */
        .game-stats {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 40px;
            color: #888ea0;
            font-size: 14px;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        /* Game Over Modal */
        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1e1e2e, #2a1f2f);
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-icon {
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(255, 107, 74, 0.5));
        }
        
        .modal-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #FF6B4A, #FF8A5C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .modal-score {
            font-size: 48px;
            font-weight: 700;
            color: white;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
        
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        /* Responsive Design */
        @media (max-width: 900px) {
            canvas {
                width: 500px;
                height: 500px;
            }
        }
        
        @media (max-width: 700px) {
            .game-card {
                padding: 20px;
            }
            
            .game-header {
                flex-direction: column;
                gap: 20px;
            }
            
            .score-panel {
                width: 100%;
                justify-content: center;
            }
            
            .score-card {
                padding: 10px 20px;
            }
            
            .score-value {
                font-size: 24px;
            }
            
            canvas {
                width: 400px;
                height: 400px;
            }
            
            .instructions-panel {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }
            
            .instruction-item {
                justify-content: center;
            }
            
            .pause-text {
                font-size: 36px;
            }
            
            .pause-icon {
                font-size: 60px;
            }
        }
        
        @media (max-width: 500px) {
            canvas {
                width: 300px;
                height: 300px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .pause-text {
                font-size: 28px;
            }
            
            .pause-icon {
                font-size: 50px;
            }
        }
        
        /* Animations */
        .pulse-animation {
            animation: softPulse 2s infinite;
        }
        
        @keyframes softPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="glow-orb"></div>
    <div class="glow-orb-2"></div>
    
    <div class="game-wrapper">
        <div class="game-card">
            <!-- Header -->
            <div class="game-header">
                <div class="title-section">
                    <span class="snake-icon">🐍</span>
                    <div>
                        <h1 class="game-title">SNAKE ARCADE</h1>
                        <div class="game-subtitle">Classic Edition - Expanded Arena</div>
                    </div>
                </div>
                
                <div class="score-panel">
                    <div class="score-card">
                        <div class="score-label">
                            <span>🎯</span> CURRENT
                        </div>
                        <div class="score-value" id="score">0</div>
                    </div>
                    
                    <div class="score-card">
                        <div class="score-label">
                            <span>🏆</span> HIGHEST
                        </div>
                        <div class="score-value" id="highestScore">0</div>
                    </div>
                </div>
            </div>
            
            <!-- Game Canvas with Pause Overlay -->
            <div class="canvas-container">
                <div class="canvas-frame">
                    <canvas id="game" width="600" height="600"></canvas>
                    <div class="pause-overlay" id="pauseOverlay">
                        <div class="pause-content">
                            <div class="pause-icon">⏸️</div>
                            <div class="pause-text">PAUSED</div>
                            <div class="pause-hint">Press ESC or click Pause to resume</div>
                        </div>
                    </div>
                    <div class="corner-decoration corner-tl"></div>
                    <div class="corner-decoration corner-tr"></div>
                    <div class="corner-decoration corner-bl"></div>
                    <div class="corner-decoration corner-br"></div>
                </div>
            </div>
            
            <!-- Controls -->
            <div class="control-panel">
                <div class="button-group">
                    <button onclick="togglePause()" class="btn btn-pause" id="pauseButton">
                        <span class="btn-icon">⏸️</span>
                        <span id="pauseButtonText">Pause</span>
                    </button>
                    <button onclick="restartGame()" class="btn btn-restart">
                        <span class="btn-icon">🔄</span>
                        Restart Game
                    </button>
                    <a href="{% url 'accounts:user_dashboard' %}" class="btn btn-dashboard">
                        <span class="btn-icon">🏠</span>
                        Dashboard
                    </a>
                </div>
                
                <!-- Instructions -->
                <div class="instructions-panel">
                    <div class="instruction-item">
                        <span class="key-badge">↑</span>
                        <span>Move Up</span>
                    </div>
                    <div class="instruction-item">
                        <span class="key-badge">↓</span>
                        <span>Move Down</span>
                    </div>
                    <div class="instruction-item">
                        <span class="key-badge">←</span>
                        <span>Move Left</span>
                    </div>
                    <div class="instruction-item">
                        <span class="key-badge">→</span>
                        <span>Move Right</span>
                    </div>
                    <div class="instruction-item">
                        <span class="key-badge">ESC</span>
                        <span>Pause Game</span>
                    </div>
                </div>
                
                <!-- Game Stats -->
                <div class="game-stats">
                    <div class="stat">
                        <span class="stat-dot"></span>
                        <span>Eat red balls to grow</span>
                    </div>
                    <div class="stat">
                        <span class="stat-dot"></span>
                        <span>Avoid walls & yourself</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Game Over Modal -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-icon">💀</div>
            <h2 class="modal-title">GAME OVER</h2>
            <div class="modal-score" id="finalScore">0</div>
            <div class="modal-buttons">
                <button onclick="restartGame(); closeModal();" class="btn btn-restart" style="flex: 1;">
                    <span class="btn-icon">🔄</span>
                    Play Again
                </button>
                <a href="{% url 'accounts:user_dashboard' %}" class="btn btn-dashboard" style="flex: 1;">
                    <span class="btn-icon">🏠</span>
                    Dashboard
                </a>
            </div>
        </div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        
        // Increased canvas size to 600x600
        const GRID_SIZE = 30; // 600/20 = 30 cells
        const CELL_SIZE = 20; // Each cell is 20px
        
        let snake = [{x:300, y:300}]; // Start at center of larger canvas
        let direction = "RIGHT";
        let nextDirection = "RIGHT";
        
        let ball = {
            x: 200,
            y: 200
        };
        
        let score = 0;
        let highestScore = 0;
        let gameLoop;
        let gameRunning = true;
        let gamePaused = false;
        
        // Load user data
        const userData = {
            username: "{{ username }}",
            userId: "{{ user_id }}"
        };
        
        // Parse scores
        try {
            const scoresData = {{ scores|safe }};
            highestScore = scoresData.highest_score || 0;
            document.getElementById("highestScore").innerText = highestScore;
        } catch (e) {
            console.log("No previous scores found");
        }
        
        // Event listeners
        document.addEventListener("keydown", (e) => {
            // Pause with ESC key
            if (e.key === "Escape") {
                togglePause();
                return;
            }
            
            if (!gameRunning || gamePaused) return;
            
            if (e.key === "ArrowUp" && direction !== "DOWN") nextDirection = "UP";
            if (e.key === "ArrowDown" && direction !== "UP") nextDirection = "DOWN";
            if (e.key === "ArrowLeft" && direction !== "RIGHT") nextDirection = "LEFT";
            if (e.key === "ArrowRight" && direction !== "LEFT") nextDirection = "RIGHT";
        });
        
        // Toggle Pause Function
        function togglePause() {
            if (!gameRunning) return; // Don't pause if game is over
            
            gamePaused = !gamePaused;
            const pauseOverlay = document.getElementById("pauseOverlay");
            const pauseButton = document.getElementById("pauseButton");
            const pauseButtonText = document.getElementById("pauseButtonText");
            
            if (gamePaused) {
                pauseOverlay.style.display = "flex";
                pauseButton.classList.add("paused");
                pauseButtonText.innerText = "Resume";
                pauseButton.querySelector(".btn-icon").innerText = "▶️";
            } else {
                pauseOverlay.style.display = "none";
                pauseButton.classList.remove("paused");
                pauseButtonText.innerText = "Pause";
                pauseButton.querySelector(".btn-icon").innerText = "⏸️";
            }
        }
        
        // Draw function
        function draw() {
            ctx.clearRect(0, 0, 600, 600);
            
            // Draw grid pattern (updated for 600x600)
            ctx.strokeStyle = "#1a1e2c";
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 600; i += 20) {
                ctx.beginPath();
                ctx.strokeStyle = "#2a2e3c";
                ctx.moveTo(i, 0);
                ctx.lineTo(i, 600);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(600, i);
                ctx.stroke();
            }
            
            // Draw snake
            snake.forEach((segment, index) => {
                const brightness = 100 + (index * 8);
                const size = index === 0 ? 18 : 16;
                
                // Snake body gradient
                const gradient = ctx.createLinearGradient(
                    segment.x, segment.y, 
                    segment.x + size, segment.y + size
                );
                gradient.addColorStop(0, `rgb(0, ${Math.min(255, brightness)}, 0)`);
                gradient.addColorStop(1, `rgb(0, ${Math.min(200, brightness)}, 50)`);
                
                ctx.fillStyle = gradient;
                ctx.fillRect(segment.x + (index === 0 ? 0 : 2), segment.y + (index === 0 ? 0 : 2), size, size);
                
                // Add scale pattern
                ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
                ctx.fillRect(segment.x + 5, segment.y + 5, 4, 4);
                ctx.fillRect(segment.x + 11, segment.y + 11, 4, 4);
                
                // Eyes for head
                if (index === 0) {
                    ctx.fillStyle = "white";
                    if (direction === "RIGHT" || direction === "LEFT") {
                        ctx.fillRect(segment.x + (direction === "RIGHT" ? 12 : 2), segment.y + 4, 4, 4);
                        ctx.fillRect(segment.x + (direction === "RIGHT" ? 12 : 2), segment.y + 12, 4, 4);
                        ctx.fillStyle = "black";
                        ctx.fillRect(segment.x + (direction === "RIGHT" ? 13 : 3), segment.y + 5, 2, 2);
                        ctx.fillRect(segment.x + (direction === "RIGHT" ? 13 : 3), segment.y + 13, 2, 2);
                    } else {
                        ctx.fillRect(segment.x + 4, segment.y + (direction === "DOWN" ? 12 : 2), 4, 4);
                        ctx.fillRect(segment.x + 12, segment.y + (direction === "DOWN" ? 12 : 2), 4, 4);
                        ctx.fillStyle = "black";
                        ctx.fillRect(segment.x + 5, segment.y + (direction === "DOWN" ? 13 : 3), 2, 2);
                        ctx.fillRect(segment.x + 13, segment.y + (direction === "DOWN" ? 13 : 3), 2, 2);
                    }
                }
            });
            
            // Draw ball with enhanced effects
            ctx.shadowColor = "#ff4444";
            ctx.shadowBlur = 20;
            
            // Outer glow
            ctx.beginPath();
            ctx.arc(ball.x + 10, ball.y + 10, 12, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 68, 68, 0.2)";
            ctx.fill();
            
            // Main ball
            ctx.shadowBlur = 30;
            const gradient = ctx.createRadialGradient(ball.x + 6, ball.y + 6, 2, ball.x + 10, ball.y + 10, 14);
            gradient.addColorStop(0, "#ff6b6b");
            gradient.addColorStop(0.5, "#ff4444");
            gradient.addColorStop(1, "#cc0000");
            
            ctx.beginPath();
            ctx.arc(ball.x + 10, ball.y + 10, 10, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Highlight
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(ball.x + 6, ball.y + 6, 3, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.fill();
            
            // Reset shadow
            ctx.shadowBlur = 0;
            ctx.shadowColor = "transparent";
        }
        
        // Move function
        function move() {
            if (!gameRunning || gamePaused) return;
            
            direction = nextDirection;
            let head = {...snake[0]};
            
            if (direction === "RIGHT") head.x += 20;
            if (direction === "LEFT") head.x -= 20;
            if (direction === "UP") head.y -= 20;
            if (direction === "DOWN") head.y += 20;
            
            snake.unshift(head);
            
            if (head.x === ball.x && head.y === ball.y) {
                score++;
                document.getElementById("score").innerText = score;
                
                if (score > highestScore) {
                    highestScore = score;
                    document.getElementById("highestScore").innerText = highestScore;
                }
                
                let newBallPosition;
                do {
                    newBallPosition = {
                        x: Math.floor(Math.random() * 30) * 20, // 30 cells (600/20)
                        y: Math.floor(Math.random() * 30) * 20
                    };
                } while (snake.some(segment => segment.x === newBallPosition.x && segment.y === newBallPosition.y));
                
                ball.x = newBallPosition.x;
                ball.y = newBallPosition.y;
            } else {
                snake.pop();
            }
            
            // Check wall collision (updated for 600)
            if (head.x < 0 || head.y < 0 || head.x >= 600 || head.y >= 600) {
                gameOver();
            }
            
            // Check self collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    break;
                }
            }
        }
        
        // Game over function
        function gameOver() {
            gameRunning = false;
            gamePaused = false; // Reset pause state
            clearInterval(gameLoop);
            
            // Hide pause overlay if visible
            document.getElementById("pauseOverlay").style.display = "none";
            
            document.getElementById("finalScore").innerText = score;
            document.getElementById("gameOverModal").style.display = "flex";
            
            fetch("/user/api/save-score/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie('csrftoken')
                },
                body: JSON.stringify({
                    game: "SNAKE",
                    score: score,
                    completed: true
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    console.log("Score saved successfully");
                }
            })
            .catch(error => {
                console.error("Error saving score:", error);
            });
        }
        
        function closeModal() {
            document.getElementById("gameOverModal").style.display = "none";
        }
        
        function restartGame() {
            snake = [{x:300, y:300}]; // Center of larger canvas
            direction = "RIGHT";
            nextDirection = "RIGHT";
            score = 0;
            gameRunning = true;
            gamePaused = false;
            
            // Reset pause button and overlay
            document.getElementById("pauseOverlay").style.display = "none";
            const pauseButton = document.getElementById("pauseButton");
            const pauseButtonText = document.getElementById("pauseButtonText");
            pauseButton.classList.remove("paused");
            pauseButtonText.innerText = "Pause";
            pauseButton.querySelector(".btn-icon").innerText = "⏸️";
            
            document.getElementById("score").innerText = "0";
            document.getElementById("gameOverModal").style.display = "none";
            
            ball.x = Math.floor(Math.random() * 30) * 20;
            ball.y = Math.floor(Math.random() * 30) * 20;
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(game, 120);
        }
        
        function game() {
            if (gameRunning && !gamePaused) {
                move();
                draw();
            } else {
                // Still draw when paused to keep the screen updated
                draw();
            }
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        // Start the game
        gameLoop = setInterval(game, 120);
    </script>
</body>
</html>
